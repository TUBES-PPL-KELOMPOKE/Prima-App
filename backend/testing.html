<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prima Backend — API Testing Dashboard</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface2: #243044;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --get: #22c55e;
      --post: #3b82f6;
      --put: #f59e0b;
      --patch: #a855f7;
      --delete: #ef4444;
      --sidebar-w: 280px;
      --radius: 10px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
      --mono: "Cascadia Code", "Fira Code", Consolas, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      height: 100vh;
      position: sticky;
      top: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .sidebar-header p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .base-url-box {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .base-url-box label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .base-url-box input {
      width: 100%;
      padding: 0.45rem 0.6rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.78rem;
    }

    .nav-list {
      list-style: none;
      padding: 0.5rem 0;
      flex: 1;
    }

    .nav-list a {
      display: block;
      padding: 0.55rem 1rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }

    .nav-list a:hover,
    .nav-list a.active {
      color: var(--text);
      background: var(--surface2);
      border-left-color: var(--primary);
    }

    .nav-list .fr-code {
      display: inline-block;
      min-width: 2.5rem;
      font-weight: 700;
      color: var(--primary);
      font-size: 0.72rem;
    }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .topbar {
      padding: 0.85rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .topbar h2 {
      font-size: 1rem;
      font-weight: 600;
    }

    .status-pill {
      font-size: 0.75rem;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      background: var(--surface2);
      color: var(--muted);
    }

    .status-pill.ok {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
    }

    .status-pill.err {
      background: rgba(239, 68, 68, 0.15);
      color: var(--danger);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem 2rem;
    }

    .feature-section {
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .feature-section.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .feature-title {
      margin-bottom: 0.35rem;
      font-size: 1.35rem;
    }

    .feature-desc {
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 1.25rem;
    }

    .endpoint-grid {
      display: grid;
      gap: 1rem;
    }

    .endpoint-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .endpoint-header {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .method {
      font-size: 0.68rem;
      font-weight: 800;
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
      letter-spacing: 0.04em;
      font-family: var(--mono);
    }

    .method.GET {
      background: rgba(34, 197, 94, 0.2);
      color: var(--get);
    }

    .method.POST {
      background: rgba(59, 130, 246, 0.2);
      color: var(--post);
    }

    .method.PUT {
      background: rgba(245, 158, 11, 0.2);
      color: var(--put);
    }

    .method.PATCH {
      background: rgba(168, 85, 247, 0.2);
      color: var(--patch);
    }

    .method.DELETE {
      background: rgba(239, 68, 68, 0.2);
      color: var(--delete);
    }

    .endpoint-path {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text);
      word-break: break-all;
    }

    .endpoint-body {
      padding: 1rem;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.65rem;
      margin-bottom: 0.75rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .field input,
    .field select,
    .field textarea {
      padding: 0.45rem 0.55rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.82rem;
      font-family: inherit;
    }

    .field textarea {
      font-family: var(--mono);
      font-size: 0.75rem;
      min-height: 100px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      transition: background 0.15s;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .response-panel {
      margin-top: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .response-header {
      padding: 0.65rem 1rem;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
    }

    .response-meta {
      color: var(--muted);
      font-size: 0.75rem;
    }

    .response-body {
      padding: 1rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 420px;
      overflow: auto;
      line-height: 1.5;
    }

    .response-body.empty {
      color: var(--muted);
      font-style: italic;
    }

    }

    /* ==========================================
       ADMIN DASHBOARD PREMIUM CSS STYLES
       ========================================== */
    .dashboard-container {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .dashboard-header-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }

    .stat-card {
      background: linear-gradient(135deg, rgba(26, 35, 50, 0.7), rgba(36, 48, 68, 0.4));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(10px);
      transition: all 0.25s ease;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      border-color: var(--primary);
      box-shadow: 0 6px 25px rgba(59, 130, 246, 0.15);
    }

    .stat-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--primary);
    }

    .stat-card.users::before {
      background: var(--primary);
    }

    .stat-card.bookings::before {
      background: var(--warning);
    }

    .stat-card.revenue::before {
      background: var(--success);
    }

    .stat-card.records::before {
      background: var(--patch);
    }

    .stat-card-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .stat-card-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .stat-card-details {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .stat-card-details span {
      display: flex;
      justify-content: space-between;
    }

    .dashboard-tabs {
      display: flex;
      gap: 0.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      overflow-x: auto;
      white-space: nowrap;
    }

    .db-tab-btn {
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.82rem;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .db-tab-btn:hover {
      color: var(--text);
      background: var(--surface);
    }

    .db-tab-btn.active {
      color: #fff;
      background: var(--primary);
      border-color: var(--primary);
    }

    .db-tab-content {
      display: none;
      animation: fadeIn 0.2s ease;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    .db-tab-content.active {
      display: block;
    }

    .db-table-container {
      overflow-x: auto;
      margin-top: 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .db-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.8rem;
    }

    .db-table th {
      background: var(--surface2);
      color: var(--muted);
      font-weight: 600;
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid var(--border);
    }

    .db-table td {
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    .db-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-admin {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    .badge-doctor {
      background: rgba(59, 130, 246, 0.2);
      color: var(--primary);
    }

    .badge-pasien {
      background: rgba(34, 197, 94, 0.2);
      color: var(--success);
    }

    .badge-active {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .badge-inactive {
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
    }

    .badge-status-selesai {
      background: rgba(34, 197, 94, 0.2);
      color: var(--success);
    }

    .badge-status-menunggu {
      background: rgba(245, 158, 11, 0.2);
      color: var(--warning);
    }

    .badge-status-dibatalkan {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    .badge-status-aktif {
      background: rgba(59, 130, 246, 0.2);
      color: var(--primary);
    }

    .db-form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.85rem;
      margin-bottom: 0.85rem;
    }

    .ai-insight-box {
      background: linear-gradient(to right, rgba(168, 85, 247, 0.05), rgba(59, 130, 246, 0.05));
      border: 1px dashed var(--patch);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-top: 1rem;
    }

    .ai-insight-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--patch);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .vector-status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      background: var(--surface2);
      padding: 0.25rem 0.6rem;
      border-radius: 99px;
      border: 1px solid var(--border);
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
      }

      70% {
        transform: scale(1);
        box-shadow: 0 0 0 6px rgba(34, 197, 94, 0);
      }

      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
      }
    }

    @media (max-width: 900px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-width: 0;
        height: auto;
        position: relative;
      }

      .main {
        height: auto;
      }
    }
  </style>

<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Prima Backend API Tester</h1>
      <p>Dashboard testing semua fitur FR01–FR21</p>
    </div>
    <div class="base-url-box">
      <label for="baseUrl">Base URL</label>
      <input id="baseUrl" type="url" value="https://backend-prima.vercel.app/" />
    </div>
    <ul class="nav-list" id="navList"></ul>
  </aside>

  <div class="main">
    <div class="topbar">
      <h2 id="topTitle">Pilih fitur</h2>
      <span class="status-pill" id="healthStatus">Belum dicek</span>
    </div>
    <div class="content" id="content"></div>
  </div>


  <script>
    const BASE_DEFAULT = "http://backend-prima.vercel.app";

    const FEATURES = [
      {
        id: "fr01",
        code: "FR01",
        title: "Manajemen Profil Pasien",
        desc: "Registrasi, lihat, update profil pasien, dan upload foto.",
        endpoints: [
          {
            method: "POST", path: "/auth/register/pasien", label: "Register Pasien",
            body: {
              name: "Budi Santoso", email: "budi@example.com", password: "password123",
              nama_panggilan: "Budi", jenis_kelamin: "L", tanggal_lahir: "1995-05-15",
              no_telepon: "081234567890", alamat: "Jl. Merdeka 1", kota: "Jakarta",
              provinsi: "DKI Jakarta", kode_pos: "10110", nik: "3171234567890001",
              golongan_darah: "O", rhesus: "+", tinggi_badan_cm: 170, berat_badan_kg: 65,
              riwayat_alergi: "Tidak ada", riwayat_penyakit: "Tidak ada", no_bpjs: "0001234567890"
            }
          },
          {
            method: "GET", path: "/auth/users/{id}", label: "Get User by ID",
            params: [{ key: "id", label: "User ID", placeholder: "uuid pasien" }]
          },
          {
            method: "PATCH", path: "/auth/users/{id}/pasien", label: "Update Profil Pasien",
            params: [{ key: "id", label: "User ID", placeholder: "uuid pasien" }],
            body: { nama_panggilan: "Budi Updated", no_telepon: "08199999999", kota: "Bandung" }
          },
          {
            method: "POST", path: "/auth/users/{id}/photo", label: "Upload Foto Profil",
            params: [{ key: "id", label: "User ID", placeholder: "uuid pasien" }],
            multipart: true, fileField: "file"
          }
        ]
      },
      {
        id: "fr02",
        code: "FR02",
        title: "Manajemen Profil Dokter",
        desc: "Registrasi dan update profil dokter.",
        endpoints: [
          {
            method: "POST", path: "/auth/register/doctor", label: "Register Dokter",
            body: {
              name: "Dr. Andi Wijaya", email: "andi.dokter@example.com", password: "password123",
              nomor_str: "STR-123456", nomor_sip: "SIP-654321", spesialisasi: "Dokter Umum",
              sub_spesialisasi: "", pengalaman_tahun: 5, deskripsi_profil: "Dokter berpengalaman",
              biaya_konsultasi: 150000, nama_klinik: "Klinik Prima", alamat_klinik: "Jl. Sehat 10",
              jenis_kelamin: "L", no_telepon: "081111111111", kota: "Jakarta"
            }
          },
          {
            method: "PATCH", path: "/auth/users/{id}/doctor", label: "Update Profil Dokter",
            params: [{ key: "id", label: "User ID", placeholder: "uuid dokter" }],
            body: { spesialisasi: "Dokter Anak", biaya_konsultasi: 200000, deskripsi_profil: "Spesialis anak" }
          }
        ]
      },
      {
        id: "fr03",
        code: "FR03",
        title: "Pencarian & Filter Dokter",
        desc: "List dokter dengan filter dan detail dokter.",
        endpoints: [
          {
            method: "GET", path: "/doctors", label: "List & Filter Dokter",
            query: [
              { key: "nama", placeholder: "nama dokter" },
              { key: "spesialisasi", placeholder: "Dokter Umum" },
              { key: "kota", placeholder: "Jakarta" },
              { key: "rating_min", placeholder: "4" },
              { key: "tersedia", placeholder: "true / false" },
              { key: "limit", placeholder: "10" },
              { key: "offset", placeholder: "0" }
            ]
          },
          {
            method: "GET", path: "/doctors/{id}", label: "Detail Dokter",
            params: [{ key: "id", label: "Doctor ID", placeholder: "uuid dokter" }]
          }
        ]
      },
      {
        id: "fr04",
        code: "FR04",
        title: "Manajemen Janji Temu",
        desc: "CRUD booking / appointment pasien dengan dokter.",
        endpoints: [
          {
            method: "POST", path: "/schedules/bookings", label: "Buat Booking",
            body: {
              doctor_id: "", pasien_id: "", appointment_date: "2026-06-15",
              start_time: "09:00", end_time: "09:30", notes: "Kontrol rutin"
            }
          },
          {
            method: "GET", path: "/schedules/bookings/{id}", label: "Detail Booking",
            params: [{ key: "id", label: "Booking ID", placeholder: "uuid booking" }]
          },
          {
            method: "PATCH", path: "/schedules/bookings/{id}", label: "Update Booking",
            params: [{ key: "id", label: "Booking ID", placeholder: "uuid booking" }],
            body: { status: "dikonfirmasi", notes: "Diupdate via dashboard" }
          },
          {
            method: "DELETE", path: "/schedules/bookings/{id}", label: "Hapus Booking",
            params: [{ key: "id", label: "Booking ID", placeholder: "uuid booking" }]
          },
          {
            method: "GET", path: "/schedules/doctor/{doctor_id}/bookings", label: "Booking per Dokter",
            params: [{ key: "doctor_id", label: "Doctor ID", placeholder: "uuid dokter" }],
            query: [{ key: "date", placeholder: "2026-06-15" }, { key: "status", placeholder: "menunggu" }]
          },
          {
            method: "GET", path: "/schedules/user/{user_id}/bookings", label: "Booking per User",
            params: [{ key: "user_id", label: "User ID", placeholder: "uuid pasien" }],
            query: [{ key: "date", placeholder: "2026-06-15" }, { key: "status", placeholder: "menunggu" }]
          }
        ]
      },
      {
        id: "fr05",
        code: "FR05",
        title: "Rekam Medis Digital",
        desc: "CRUD rekam medis pasien.",
        endpoints: [
          {
            method: "POST", path: "/medical", label: "Buat Rekam Medis",
            body: {
              pasien_id: "", doctor_id: "", booking_id: null,
              type: "diagnosis", judul: "Pemeriksaan Rutin",
              deskripsi: "Pasien datang untuk kontrol", catatan_dokter: "Kondisi stabil",
              attachment_url: null
            }
          },
          {
            method: "GET", path: "/medical/pasien/{pasien_id}", label: "Rekam Medis per Pasien",
            params: [{ key: "pasien_id", label: "Pasien ID", placeholder: "uuid pasien" }],
            query: [
              { key: "type", placeholder: "kunjungan" },
              { key: "date_from", placeholder: "2026-01-01" },
              { key: "date_to", placeholder: "2026-12-31" },
              { key: "limit", placeholder: "10" },
              { key: "offset", placeholder: "0" }
            ]

              { key: "id", label: "Program ID", placeholder: "uuid program" },
              { key: "pasien_id", label: "Pasien ID", placeholder: "uuid pasien" }
            ],
            body: { status: "diterima" },
            hint: "status: menunggu | diterima | ditolak"
          }
        ]
      }
    ];

    function getBaseUrl() {
      const val = document.getElementById("baseUrl").value.trim();
      return (val || BASE_DEFAULT).replace(/\/+$/, "");
    }

    function buildPath(template, paramValues) {
      let path = template;
      for (const [key, val] of Object.entries(paramValues)) {
        path = path.replace(`{${key}}`, encodeURIComponent(val || ""));
      }
      return path;
    }

    function buildQuery(queryFields) {
      const params = new URLSearchParams();
      for (const q of queryFields || []) {
        const el = document.getElementById(q.inputId);
        if (el && el.value.trim()) params.set(q.key, el.value.trim());
      }
      const str = params.toString();
      return str ? `?${str}` : "";
    }

    async function sendRequest(cardEl) {
      const method = cardEl.dataset.method;
      const pathTemplate = cardEl.dataset.path;
      const isMultipart = cardEl.dataset.multipart === "true";
      const isDownload = cardEl.dataset.download === "true";
      const fileInputId = cardEl.dataset.fileInput;

      const paramValues = {};
      cardEl.querySelectorAll("[data-param]").forEach((input) => {
        paramValues[input.dataset.param] = input.value.trim();
      });

      let path = buildPath(pathTemplate, paramValues);
      const queryStr = buildQuery(JSON.parse(cardEl.dataset.query || "[]"));
      const url = getBaseUrl() + path + queryStr;

      const responseEl = document.getElementById("globalResponse");
      const metaEl = document.getElementById("responseMeta");
      responseEl.textContent = "Loading...";
      responseEl.classList.remove("empty");
      metaEl.textContent = `${method} ${url}`;

      const start = performance.now();
      const opts = { method, headers: {} };

      try {
        if (isMultipart) {
          const fd = new FormData();
          const fileEl = document.getElementById(fileInputId);
          if (fileEl && fileEl.files[0]) fd.append("file", fileEl.files[0]);
          opts.body = fd;
        } else if (["POST", "PUT", "PATCH"].includes(method)) {
          const bodyEl = cardEl.querySelector("[data-body]");
          if (bodyEl) {
            opts.headers["Content-Type"] = "application/json";
            const raw = bodyEl.value.trim();
            opts.body = raw || "{}";
          }
        }

        const res = await fetch(url, opts);
        const elapsed = Math.round(performance.now() - start);
        const contentType = res.headers.get("content-type") || "";

        metaEl.textContent = `${method} ${url} — ${res.status} ${res.statusText} (${elapsed}ms)`;

        if (isDownload || contentType.includes("application/pdf") || contentType.includes("text/csv")) {
          const blob = await res.blob();
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          const disp = res.headers.get("content-disposition") || "";
          const match = disp.match(/filename="?([^";\n]+)"?/);
          a.download = match ? match[1] : "download";
          a.click();
          URL.revokeObjectURL(a.href);
          responseEl.textContent = `[File downloaded: ${a.download}] Status: ${res.status}`;
          updateHealthPill(res.ok);
          return;
        }

        const text = await res.text();
        try {
          responseEl.textContent = JSON.stringify(JSON.parse(text), null, 2);
        } catch {
          responseEl.textContent = text || "(empty response)";
        }
        updateHealthPill(res.ok);
      } catch (err) {
        metaEl.textContent = `${method} ${url} — ERROR`;
        responseEl.textContent = `Request failed: ${err.message}\n\nPastikan CORS aktif dan base URL benar.`;
        updateHealthPill(false);
      }
    }

    function updateHealthPill(ok) {
      const pill = document.getElementById("healthStatus");
      pill.textContent = ok ? "API OK" : "Request gagal";
      pill.className = "status-pill " + (ok ? "ok" : "err");
    }

    function renderEndpoint(ep, featureId, idx) {
      const cardId = `${featureId}-ep-${idx}`;
      const queryFields = (ep.query || []).map((q, qi) => ({
        ...q,
        inputId: `${cardId}-q-${qi}`
      }));

      let fieldsHtml = "";

      if (ep.params) {
        fieldsHtml += `<div class="field-grid">`;
        for (const p of ep.params) {
          fieldsHtml += `
            <div class="field">
              <label>${p.label || p.key}</label>
              <input type="text" data-param="${p.key}" placeholder="${p.placeholder || ""}" />
            </div>`;
        }
        fieldsHtml += `</div>`;
      }

      if (queryFields.length) {
        fieldsHtml += `<div class="field-grid">`;
        for (const q of queryFields) {
          fieldsHtml += `
            <div class="field">
              <label>Query: ${q.key}</label>
              <input type="text" id="${q.inputId}" placeholder="${q.placeholder || ""}" />
            </div>`;
        }
        fieldsHtml += `</div>`;
      }

      if (ep.multipart) {
        const fileId = `${cardId}-file`;
        fieldsHtml += `
          <div class="field full">
            <label>File Upload</label>
            <input type="file" id="${fileId}" />
          </div>`;
      } else if (ep.body !== undefined && ["POST", "PUT", "PATCH"].includes(ep.method)) {
        fieldsHtml += `
          <div class="field full">
            <label>Request Body (JSON)</label>
            <textarea data-body>${JSON.stringify(ep.body, null, 2)}</textarea>
          </div>`;
      }

      const hint = ep.hint ? `<p class="hint">${ep.hint}</p>` : "";

      return `
        <div class="endpoint-card" id="${cardId}"
          data-method="${ep.method}"
          data-path="${ep.path}"
          data-multipart="${!!ep.multipart}"
          data-download="${!!ep.isDownload}"
          data-file-input="${cardId}-file"
          data-query='${JSON.stringify(queryFields)}'>
          <div class="endpoint-header">
            <span class="method ${ep.method}">${ep.method}</span>
            <span class="endpoint-path">${ep.path}</span>
          </div>
          <div class="endpoint-body">
            <strong style="font-size:0.88rem;display:block;margin-bottom:0.65rem">${ep.label}</strong>
            ${fieldsHtml}
            ${hint}
            <div class="actions">
              <button class="btn btn-primary" onclick="sendRequest(document.getElementById('${cardId}'))">Kirim Request</button>
              ${ep.body !== undefined && !ep.multipart ? `<button class="btn btn-secondary" onclick="formatJson(document.querySelector('#${cardId} [data-body]'))">Format JSON</button>` : ""}
            </div>
          </div>
        </div>`;
    }

    function formatJson(textarea) {
      try {
        textarea.value = JSON.stringify(JSON.parse(textarea.value), null, 2);
      } catch {
        alert("JSON tidak valid");
      }
    }

          const data = r.data || r;
          document.getElementById("stats-users-total").textContent = data.summary?.total_users ?? 0;
          document.getElementById("stats-users-pasien").textContent = data.summary?.breakdown?.pasien ?? 0;
          document.getElementById("stats-users-doctor").textContent = data.summary?.breakdown?.doctor ?? 0;
          document.getElementById("stats-users-admin").textContent = data.summary?.breakdown?.admin ?? 0;
        }

        const resBookings = await fetch(`${baseUrl}/reports/appointments`);
        if (resBookings.ok) {
          const r = await resBookings.json();
          const data = r.data || r;
          document.getElementById("stats-bookings-total").textContent = data.summary?.total ?? 0;
          document.getElementById("stats-bookings-completed").textContent = data.summary?.breakdown?.selesai ?? 0;
          document.getElementById("stats-bookings-pending").textContent = data.summary?.breakdown?.menunggu ?? 0;
          document.getElementById("stats-bookings-cancelled").textContent = data.summary?.breakdown?.dibatalkan ?? 0;
        }

        const resRevenue = await fetch(`${baseUrl}/reports/revenue`);
        if (resRevenue.ok) {
          const r = await resRevenue.json();
          const data = r.data || r;
          const totalVal = data.summary?.total_estimasi_pendapatan ?? 0;
          document.getElementById("stats-revenue-total").textContent = new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", maximumFractionDigits: 0 }).format(totalVal);
          document.getElementById("stats-revenue-count").textContent = data.summary?.total_konsultasi_selesai ?? 0;
          const count = data.summary?.total_konsultasi_selesai ?? 0;
          const avg = count > 0 ? Math.round(totalVal / count) : 0;
          document.getElementById("stats-revenue-avg").textContent = new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", maximumFractionDigits: 0 }).format(avg);
        }

        const resConsults = await fetch(`${baseUrl}/reports/consultations`);
        let consultCount = 0;
        if (resConsults.ok) {
          const r = await resConsults.json();
          const data = r.data || r;
          consultCount = data.summary?.total ?? 0;
          document.getElementById("stats-consults-total").textContent = consultCount;
        }

        const resProg = await fetch(`${baseUrl}/programs`);
        let programCount = 0;
        if (resProg.ok) {
          const r = await resProg.json();
          const data = Array.isArray(r) ? r : r.data || [];
          programCount = data.length;
          document.getElementById("stats-programs-count").textContent = programCount;
        }

        document.getElementById("stats-records-total").textContent = consultCount + programCount;
      } catch (err) {
        console.error("Gagal memuat statistik dashboard:", err);
      }
    }

    async function fetchDoctorReviews() {
      const baseUrl = getBaseUrl();
      const doctorId = document.getElementById("review-doctor-select").value;
      const btnInsight = document.getElementById("btn-get-ai-insight");
      const summaryDiv = document.getElementById("reviews-sentiment-summary");
      const insightBox = document.getElementById("doctor-ai-insight-box");
      const tbody = document.getElementById("db-reviews-list-body");

      if (!doctorId) {
        btnInsight.style.display = "none";
        summaryDiv.style.display = "none";
        insightBox.style.display = "none";
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--muted);">Silakan pilih dokter untuk memuat ulasan.</td></tr>`;
        return;
      }

      btnInsight.style.display = "inline-block";
      insightBox.style.display = "none";
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--muted);">Memuat ulasan...</td></tr>`;

      try {
        const res = await fetch(`${baseUrl}/reviews/doctor/${doctorId}`);
        if (!res.ok) throw new Error("Gagal mengambil ulasan");
        const data = await res.json();

        summaryDiv.style.display = "flex";
        document.getElementById("doctor-rating-avg").textContent = data.doctor?.rata_rata_rating ?? "0";
        document.getElementById("count-sentiment-positive").textContent = data.sentiment_breakdown?.positif ?? "0";
        document.getElementById("count-sentiment-neutral").textContent = data.sentiment_breakdown?.netral ?? "0";
        document.getElementById("count-sentiment-negative").textContent = data.sentiment_breakdown?.negatif ?? "0";

        const reviews = data.reviews || [];
        if (reviews.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--muted);">Belum ada ulasan untuk dokter ini.</td></tr>`;
          return;
        }

        tbody.innerHTML = reviews.map((r) => {
          let sBadge = "";
          if (r.sentiment === "positif") sBadge = `<span class="badge badge-status-selesai">Positif</span>`;
          else if (r.sentiment === "negatif") sBadge = `<span class="badge badge-status-dibatalkan">Negatif</span>`;
          else sBadge = `<span class="badge badge-status-menunggu">Netral</span>`;

          return `
            <tr>
              <td style="font-weight:600;">${r.pasien_name || r.pasien_id}</td>
              <td style="color:var(--warning); font-weight:700;">★ ${r.rating}</td>
              <td>"${r.ulasan}"</td>
              <td>${sBadge}</td>
              <td>${new Date(r.created_at).toLocaleDateString("id-ID")}</td>
            </tr>
          `;
        }).join("");
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--danger);">Error: ${err.message}</td></tr>`;
      }
    }

    async function fetchDoctorAiInsight() {
      const baseUrl = getBaseUrl();
      const doctorId = document.getElementById("review-doctor-select").value;
      const insightBox = document.getElementById("doctor-ai-insight-box");
      const insightContent = document.getElementById("ai-insight-content");

      if (!doctorId) return;

      insightBox.style.display = "block";
      insightContent.innerHTML = `
        <div style="display:flex; align-items:center; gap:0.5rem; color:var(--muted);">
          <div class="pulse-dot"></div> Menganalisis ulasan dengan AI... Mohon tunggu.
        </div>`;

      try {
        const res = await fetch(`${baseUrl}/reviews/doctor/${doctorId}/insight`);
        if (!res.ok) throw new Error("Gagal mengambil insight AI");
        const json = await res.json();
        const insight = json.insight || {};

        let kelebihanHtml = (insight.kelebihan || []).map((k) => `<li>🟢 ${k}</li>`).join("");
        let kekuranganHtml = (insight.kekurangan || []).map((k) => `<li>🔴 ${k}</li>`).join("");
        let saranHtml = (insight.saran_perbaikan || []).map((s) => `<li>💡 ${s}</li>`).join("");

        insightContent.innerHTML = `
          <p style="margin-bottom:0.75rem; font-style:italic;">"${insight.ringkasan || 'Tidak ada ringkasan.'}"</p>
          <div style="display:grid; grid-template-columns:1fr; gap:0.75rem; margin-top:0.75rem;">
            ${kelebihanHtml ? `<div><strong>Kelebihan Dokter:</strong><ul style="list-style:none; padding-left:0; margin-top:0.25rem;">${kelebihanHtml}</ul></div>` : ""}
            ${kekuranganHtml ? `<div><strong>Kekurangan / Keluhan:</strong><ul style="list-style:none; padding-left:0; margin-top:0.25rem;">${kekuranganHtml}</ul></div>` : ""}
            ${saranHtml ? `<div><strong>Saran Perbaikan AI:</strong><ul style="list-style:none; padding-left:0; margin-top:0.25rem;">${saranHtml}</ul></div>` : ""}
          </div>
          <p style="font-size:0.68rem; color:var(--muted); margin-top:0.75rem; border-top:1px dashed var(--border); padding-top:0.5rem;">${json.disclaimer || 'Dihasilkan oleh AI.'}</p>
        `;
      } catch (err) {
        insightContent.innerHTML = `<span style="color:var(--danger);">Gagal menganalisis insight AI: ${err.message}</span>`;
      }
    }

    async function loadReportPreview() {
      const baseUrl = getBaseUrl();
      const from = document.getElementById("report-date-from").value;
      const to = document.getElementById("report-date-to").value;
      const previewEl = document.getElementById("reports-preview-output");

      previewEl.textContent = "Mengambil data laporan...";
      try {
        let url = `${baseUrl}/reports/users?limit=5`;
        if (from) url += `&date_from=${from}`;
        if (to) url += `&date_to=${to}`;

        const res = await fetch(url);
        if (!res.ok) throw new Error("Gagal mengambil data laporan");
        const json = await res.json();
        previewEl.textContent = JSON.stringify(json.data || json, null, 2);
      } catch (err) {
        previewEl.textContent = "Error: " + err.message;
      }
    }

    async function uploadRagPdf() {
      const baseUrl = getBaseUrl();
      const fileInput = document.getElementById("rag-pdf-file-input");
      if (!fileInput.files[0]) {
        alert("Silakan pilih berkas PDF terlebih dahulu!");
        return;
      }

      const fd = new FormData();
      fd.append("file", fileInput.files[0]);

      alert("Mengunggah PDF ke Cloudinary & memproses embedding. Mohon tunggu beberapa detik...");

      try {
        const res = await fetch(`${baseUrl}/upload/pdf`, {
          method: "POST",
          body: fd,
        });
        const json = await res.json();
        alert("Hasil Upload RAG PDF:\n" + JSON.stringify(json, null, 2));
      } catch (err) {
        alert("Gagal upload: " + err.message);
      }
    }

    async function processRagPdfUrl() {
      const baseUrl = getBaseUrl();
      const url = document.getElementById("rag-pdf-url").value.trim();
      const title = document.getElementById("rag-pdf-title").value.trim();
      const public_id = document.getElementById("rag-pdf-pubid").value.trim();

      if (!url || !title || !public_id) {
        alert("Semua field url, judul, dan public_id wajib diisi!");
        return;

      try {
        const res = await fetch(`${baseUrl}/upload/pdf/rag`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, title, public_id }),
        });
        const json = await res.json();
        alert("Hasil Proses RAG:\n" + JSON.stringify(json, null, 2));
      } catch (err) {
        alert("Error: " + err.message);
      }
    }

            <!-- Tab Content: Reports -->
            <div class="db-tab-content" id="db-tab-reports">
              <h4 style="font-size:1rem; font-weight:600; margin-bottom:1rem;">📈 Laporan Ringkasan & Ekspor PDF / CSV</h4>
              
              <div style="background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:1rem; margin-bottom:1.25rem;">
                <h5 style="font-size:0.85rem; margin-bottom:0.75rem; color:var(--text);">Filter Parameter Laporan</h5>
                <div class="db-form-row">
                  <div class="field">
                    <label>Mulai Tanggal</label>
                    <input type="date" id="report-date-from" value="2026-01-01" />
                  </div>
                  <div class="field">
                    <label>Sampai Tanggal</label>
                    <input type="date" id="report-date-to" value="2026-12-31" />
                  </div>
                  <div class="field" style="display:flex; align-items:flex-end;">
                    <button class="btn btn-primary" onclick="loadReportPreview()" style="width:100%;">Tampilkan Preview</button>
                  </div>
                </div>
              </div>

              <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:1rem; margin-bottom:1.5rem;">
                <div style="background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:1rem;">
                  <strong style="display:block; font-size:0.85rem; margin-bottom:0.5rem;">Laporan Pengguna</strong>
                  <p style="font-size:0.75rem; color:var(--muted); margin-bottom:0.75rem;">Total pengguna, breakdown role, dan status aktif.</p>
                  <div style="display:flex; gap:0.5rem;">
                    <button class="btn btn-secondary" onclick="exportData('users', 'pdf')" style="font-size:0.75rem; padding:0.3rem 0.6rem;">Export PDF</button>
                    <button class="btn btn-secondary" onclick="exportData('users', 'csv')" style="font-size:0.75rem; padding:0.3rem 0.6rem;">Export CSV</button>
                  </div>
                </div>

                <div style="background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:1rem;">
                  <strong style="display:block; font-size:0.85rem; margin-bottom:0.5rem;">Laporan Janji Temu</strong>
                  <p style="font-size:0.75rem; color:var(--muted); margin-bottom:0.75rem;">Total janji temu, status pemeriksaan, dan list tanggal.</p>
                  <div style="display:flex; gap:0.5rem;">
                    <button class="btn btn-secondary" onclick="exportData('appointments', 'pdf')" style="font-size:0.75rem; padding:0.3rem 0.6rem;">Export PDF</button>
                    <button class="btn btn-secondary" onclick="exportData('appointments', 'csv')" style="font-size:0.75rem; padding:0.3rem 0.6rem;">Export CSV</button>
                  </div>
                </div>

                <div style="background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:1rem;">
                  <strong style="display:block; font-size:0.85rem; margin-bottom:0.5rem;">Laporan Konsultasi Chat</strong>
                  <p style="font-size:0.75rem; color:var(--muted); margin-bottom:0.75rem;">Sesi chat konsultasi aktif, topik medis, dan list konsultasi.</p>
                  <div style="display:flex; gap:0.5rem;">
                    <button class="btn btn-secondary" onclick="exportData('consultations', 'pdf')" style="font-size:0.75rem; padding:0.3rem 0.6rem;">Export PDF</button>
                    <button class="btn btn-secondary" onclick="exportData('consultations', 'csv')" style="font-size:0.75rem; padding:0.3rem 0.6rem;">Export CSV</button>
                  </div>
                </div>

                <div style="background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:1rem;">
                  <strong style="display:block; font-size:0.85rem; margin-bottom:0.5rem;">Laporan Rekam Medis</strong>
                  <p style="font-size:0.75rem; color:var(--muted); margin-bottom:0.75rem;">Breakdown tipe diagnosis, resep obat, vaksinasi, dan lab.</p>
                  <div style="display:flex; gap:0.5rem;">
                    <button class="btn btn-secondary" onclick="exportData('medical-records', 'pdf')" style="font-size:0.75rem; padding:0.3rem 0.6rem;">Export PDF</button>
                    <button class="btn btn-secondary" onclick="exportData('medical-records', 'csv')" style="font-size:0.75rem; padding:0.3rem 0.6rem;">Export CSV</button>
                  </div>
                </div>
              </div>

              <div style="border-top:1px solid var(--border); padding-top:1rem;">
                <h5 style="font-size:0.9rem; font-weight:600; margin-bottom:0.75rem;">Preview Laporan Real-time</h5>
                <pre id="reports-preview-output" style="font-family:var(--mono); font-size:0.75rem; background:var(--bg); border:1px solid var(--border); padding:1rem; border-radius:6px; max-height:300px; overflow:auto; color:var(--muted);">Klik "Tampilkan Preview" untuk melihat cuplikan data JSON laporan.</pre>
              </div>
            </div>

            <!-- Tab Content: Vector DB / RAG -->
            <div class="db-tab-content" id="db-tab-rag">
              <h4 style="font-size:1rem; font-weight:600; margin-bottom:1rem;">🤖 Vector Database & AI RAG Knowledge Base</h4>
              
              <div style="display:grid; grid-template-columns:1fr; gap:1.25rem;">
                <div style="background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:1.25rem;">
                  <h5 style="font-size:0.85rem; margin-bottom:0.75rem; display:flex; justify-content:space-between; align-items:center;">
                    Status Vector DB pgvector
                    <span class="vector-status-pill"><span class="pulse-dot"></span> Aktif</span>
                  </h5>
                  <div style="font-size:0.8rem; color:var(--muted); line-height:1.5; margin-bottom:1rem;">
                    Vector DB menyimpan data potongan berkas (chunks) dengan representasi embedding AI 1536-dimensi untuk menjawab pertanyaan RAG secara opsional.
                  </div>
                  <div style="display:flex; gap:0.5rem;">
                    <button class="btn btn-secondary" onclick="checkVectorDbStatus()">Cek Status Koneksi</button>
                    <button class="btn btn-primary" onclick="initVectorDb()">Inisialisasi DB Vector</button>
                  </div>
                  <pre id="rag-status-output" style="font-family:var(--mono); font-size:0.72rem; margin-top:0.75rem; background:var(--bg); padding:0.5rem; border-radius:4px; max-height:100px; overflow:auto; display:none;"></pre>
                </div>

                <div style="background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:1.25rem;">
                  <h5 style="font-size:0.85rem; margin-bottom:0.75rem;">Simulasi Tambah Pengetahuan RAG (PDF)</h5>
                  <div class="field" style="margin-bottom:0.75rem;">
                    <label>Upload File PDF</label>
                    <input type="file" id="rag-pdf-file-input" style="background:var(--bg); border:1px solid var(--border); width:100%;" />
                  </div>
                  <button class="btn btn-primary" onclick="uploadRagPdf()" style="margin-bottom:1rem;">Upload File & Index Embedding</button>

                  <div style="border-top:1px solid var(--border); padding-top:0.75rem;">
                    <label style="font-size:0.72rem; color:var(--muted); display:block; margin-bottom:0.35rem;">Atau Proses RAG PDF via URL Cloudinary</label>
                    <div class="db-form-row">
                      <div class="field">
                        <input type="text" id="rag-pdf-url" placeholder="https://res.cloudinary.com/.../document.pdf" />
                      </div>
                      <div class="field">
                        <input type="text" id="rag-pdf-title" placeholder="Judul Dokumen" />
                      </div>
                      <div class="field">
                        <input type="text" id="rag-pdf-pubid" placeholder="public_id (e.g. documents/123)" />
                      </div>
                    </div>
                    <button class="btn btn-secondary" onclick="processRagPdfUrl()">Proses Embedding URL</button>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </section>
      ` + FEATURES.map(renderFeature).join("") + `
        <div class="response-panel">
          <div class="response-header">
            <strong>Response</strong>
            <span class="response-meta" id="responseMeta">—</span>
          </div>
          <pre class="response-body empty" id="globalResponse">Kirim request untuk melihat response di sini.</pre>
        </div>`;

      nav.addEventListener("click", (e) => {
        const a = e.target.closest("a[data-nav]");
        if (!a) return;
        e.preventDefault();
        showFeature(a.dataset.nav);
        history.replaceState(null, "", `#${a.dataset.nav}`);
      });

      const hash = location.hash.replace("#", "");
      showFeature(hash && (FEATURES.some((f) => f.id === hash) || hash === "admin-dashboard") ? hash : "admin-dashboard");

      fetch(getBaseUrl() + "/")
        .then((r) => r.json())
        .then(() => updateHealthPill(true))
        .catch(() => {
          document.getElementById("healthStatus").textContent = "API offline?";
          document.getElementById("healthStatus").className = "status-pill err";
        });
    }

    init();
  </script>
</body>

</html>
